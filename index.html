<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTV Dashboard | PV & Feedback Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        .bg-police { background-color: #002d5e; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .feedback-line { position: relative; }
        .feedback-line::before { content: ''; position: absolute; left: -1.5rem; top: -1rem; bottom: 1.5rem; width: 2px; background: #e2e8f0; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <div id="loginOverlay" class="fixed inset-0 bg-[#002d5e] z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border-t-8 border-yellow-500 text-center">
            <h1 class="font-black text-3xl text-[#002d5e] uppercase italic mb-8">BTV LIVE</h1>
            <input type="text" id="uNaam" placeholder="Naam Verbalisant" class="w-full border-2 p-4 rounded-xl mb-4 text-center font-bold outline-none">
            <select id="uKlas" class="w-full border-2 p-4 rounded-xl mb-8 text-center font-bold outline-none">
                <option value="">-- Eenheid --</option>
                <option>Delta</option><option>Echo</option><option>Foxtrot</option>
            </select>
            <button onclick="startDashboard()" class="w-full bg-[#002d5e] text-white py-4 rounded-xl font-black uppercase tracking-widest active:scale-95 transition-all">Systeem Activeren</button>
        </div>
    </div>

    <div id="mainContent" class="hidden max-w-[1600px] mx-auto p-4 lg:p-8 space-y-6">
        
        <header class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border-b-4 border-[#002d5e]">
            <h1 class="font-black text-2xl text-[#002d5e] uppercase italic">PV Dossier <span id="displayKlas" class="text-yellow-600"></span></h1>
            <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Realtime Review Modus</div>
        </header>

        <div class="grid lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-5 space-y-6">
                <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                    <div class="bg-[#002d5e] px-6 py-4 flex justify-between items-center text-white">
                        <span class="font-black text-xs uppercase tracking-widest italic text-yellow-500">Opmaak PV van Bevindingen</span>
                        <div class="flex gap-2">
                            <button onclick="playMedia('pvInput')" class="bg-white/10 hover:bg-white/20 px-3 py-1 rounded text-[10px] font-bold uppercase">▶ Play</button>
                            <button onclick="resetMedia('pvInput')" class="bg-white/10 hover:bg-white/20 px-3 py-1 rounded text-[10px] font-bold uppercase">↺</button>
                        </div>
                    </div>
                    <div class="p-6">
                        <textarea id="pvInput" class="w-full h-96 p-6 bg-slate-50 border-2 border-slate-100 rounded-xl font-mono text-sm leading-relaxed focus:bg-white outline-none transition-all" placeholder="Ik, verbalisant...">PROCES-VERBAAL VAN BEVINDINGEN...</textarea>
                        <button onclick="send('PV Bevindingen', 'pvInput')" class="w-full mt-4 bg-[#002d5e] text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg active:scale-[0.98]">Publiceer PV ter Beoordeling</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div class="sticky top-8">
                    <h2 class="text-center font-black text-[10px] text-slate-400 uppercase tracking-[0.4em] mb-4 text-police">Live Dossier Feed</h2>
                    <div id="liveFeed" class="space-y-8 max-h-[85vh] overflow-y-auto pr-4 custom-scrollbar">
                        </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRq1HFmhrpW_EMMZwpURrbTArz-L5iWT4",
            authDomain: "pvaangifteinleveren-77dbe.firebaseapp.com",
            databaseURL: "https://pvaangifteinleveren-77dbe-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "pvaangifteinleveren-77dbe",
            storageBucket: "pvaangifteinleveren-77dbe.appspot.com",
            messagingSenderId: "20239054410",
            appId: "1:20239054410:web:264b3c759312248d9f18b3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let sNaam = "", sKlas = "", tw, fullT = "", idx = 0;

        window.startDashboard = () => {
            sNaam = document.getElementById('uNaam').value.trim();
            sKlas = document.getElementById('uKlas').value;
            if(!sNaam || !sKlas) return alert("Vul gegevens in.");
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('displayKlas').innerText = sKlas;
            initFeed(sKlas);
        };

        window.playMedia = (id) => {
            const el = document.getElementById(id);
            if(!fullT || el.value !== fullT) { fullT = el.value; idx = 0; el.value = ""; }
            clearInterval(tw);
            tw = setInterval(() => {
                if(idx < fullT.length) { el.value += fullT[idx++]; el.scrollTop = el.scrollHeight; }
                else clearInterval(tw);
            }, 25);
        };

        window.resetMedia = (id) => { clearInterval(tw); document.getElementById(id).value = fullT; fullT = ""; idx = 0; };

        window.send = (t, i) => {
            const val = document.getElementById(i).value.trim();
            if(!val) return;
            db.ref('btv_2026/' + sKlas).push().set({ naam: sNaam, type: t, txt: val, ts: Date.now() });
        };

        window.addFeedback = (pvId) => {
            const fb = prompt("Voer je feedback in voor dit PV:");
            if(!fb) return;
            db.ref('btv_2026/' + sKlas).push().set({
                naam: sNaam,
                type: 'Feedback',
                txt: fb,
                ts: Date.now(),
                targetId: pvId
            });
        };

        function initFeed(k) {
            db.ref('btv_2026/' + k).on('value', s => {
                const feed = document.getElementById('liveFeed');
                feed.innerHTML = "";
                const data = s.val(); if(!data) return;

                const allMsgs = Object.keys(data).map(id => ({id, ...data[id]}));
                const mainPVs = allMsgs.filter(m => m.type === 'PV Bevindingen').sort((a,b) => b.ts - a.ts);

                mainPVs.forEach(pv => {
                    const time = new Date(pv.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    
                    // Container voor PV + Feedback
                    let pvContainer = document.createElement('div');
                    pvContainer.className = "space-y-4";
                    
                    // Het PV zelf
                    pvContainer.innerHTML = `
                        <div class="bg-white border-l-8 border-police rounded-2xl shadow-md border border-slate-200 overflow-hidden">
                            <div class="px-5 py-3 border-b bg-slate-50/50 flex justify-between items-center">
                                <span class="font-black text-[10px] text-slate-500 uppercase">${pv.naam} • ${time}</span>
                                <button onclick="addFeedback('${pv.id}')" class="bg-yellow-500 text-white px-3 py-1 rounded-full text-[9px] font-black uppercase hover:bg-yellow-600 transition-colors">Geef Feedback</button>
                            </div>
                            <div class="p-6 text-sm font-medium leading-relaxed whitespace-pre-wrap text-slate-800">${pv.txt}</div>
                        </div>
                    `;

                    // Feedback boompje
                    const feedBacks = allMsgs.filter(f => f.type === 'Feedback' && f.targetId === pv.id).sort((a,b) => a.ts - b.ts);
                    if(feedBacks.length > 0) {
                        let fbList = document.createElement('div');
                        fbList.className = "ml-12 space-y-3";
                        feedBacks.forEach(fb => {
                            fbList.innerHTML += `
                                <div class="bg-slate-200/50 p-4 rounded-xl border-l-4 border-slate-400 text-xs italic feedback-line shadow-sm">
                                    <span class="font-black uppercase text-[9px] text-slate-500 block mb-1">${fb.naam} beoordeelt:</span>
                                    "${fb.txt}"
                                </div>
                            `;
                        });
                        pvContainer.appendChild(fbList);
                    }
                    feed.appendChild(pvContainer);
                });
            });
        }
    </script>
</body>
</html>
