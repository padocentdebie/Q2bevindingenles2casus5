<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTV Dashboard | Casus 5: Dapperstraat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        .bg-police { background-color: #002d5e; }
        .oc-glow { box-shadow: 0 0 20px rgba(220, 38, 38, 0.5); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .animate-blink { animation: blink 1.5s infinite; }
    </style>
</head>
<body class="bg-slate-200 min-h-screen font-sans">

    <div id="loginOverlay" class="fixed inset-0 bg-[#002d5e] z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border-t-8 border-yellow-500 text-center">
            <h1 class="font-black text-3xl text-[#002d5e] uppercase italic mb-8 tracking-tighter">BTV LIVE DASHBOARD</h1>
            <input type="text" id="uNaam" placeholder="Naam Verbalisant" class="w-full border-2 p-4 rounded-xl mb-4 text-center font-bold outline-none focus:border-blue-500">
            <select id="uKlas" class="w-full border-2 p-4 rounded-xl mb-8 text-center font-bold outline-none">
                <option value="">-- Eenheid --</option>
                <option>Delta</option><option>Echo</option><option>Foxtrot</option>
            </select>
            <button onclick="startDashboard()" class="w-full bg-[#002d5e] text-white py-4 rounded-xl font-black uppercase tracking-widest active:scale-95 transition-all">Systeem Activeren</button>
        </div>
    </div>

    <div id="mainContent" class="hidden max-w-[1700px] mx-auto p-4 lg:p-8 space-y-6">
        
        <header class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border-b-4 border-[#002d5e]">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-[#002d5e] rounded-lg flex items-center justify-center text-white shadow-lg">🚨</div>
                <div>
                    <h1 class="font-black text-2xl text-[#002d5e] uppercase italic">Incident Dapperstraat</h1>
                    <p class="text-[10px] font-bold text-red-600 animate-blink uppercase">● LIVE VERBINDING OPERATIONEEL CENTRUM - EENHEID <span id="displayKlas"></span></p>
                </div>
            </div>
        </header>

        <div class="grid lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-5 space-y-6">
                
                <div class="bg-white rounded-2xl shadow-xl border-2 border-red-600 overflow-hidden oc-glow">
                    <div class="bg-red-600 px-6 py-3 flex justify-between items-center text-white">
                        <span class="font-black text-xs uppercase tracking-widest italic">Inkomende OC-Melding</span>
                        <div class="flex gap-2">
                            <button onclick="mediaControl('play', 'ocInput')" class="bg-white/20 hover:bg-white/40 p-2 rounded-lg transition-all">▶</button>
                            <button onclick="resetMedia('ocInput')" class="bg-white/20 hover:bg-white/40 p-2 rounded-lg transition-all">↺</button>
                        </div>
                    </div>
                    
                    <div class="p-4 grid grid-cols-2 gap-2 bg-slate-50 border-b">
                        <div class="relative"><img src="casus5luchtfoto.png" class="rounded border h-28 w-full object-cover shadow-sm"><span class="absolute bottom-1 left-1 bg-black/60 text-[8px] text-white px-1 rounded uppercase">Luchtfoto</span></div>
                        <div class="relative"><img src="casus5streetview.png" class="rounded border h-28 w-full object-cover shadow-sm"><span class="absolute bottom-1 left-1 bg-black/60 text-[8px] text-white px-1 rounded uppercase">Streetview</span></div>
                        <div class="relative"><img src="casus5terplaatse.png" class="rounded border h-28 w-full object-cover shadow-sm"><span class="absolute bottom-1 left-1 bg-black/60 text-[8px] text-white px-1 rounded uppercase">Ter Plaatse</span></div>
                        <div class="relative"><img src="casus530kmuur.png" class="rounded border h-28 w-full object-cover shadow-sm"><span class="absolute bottom-1 left-1 bg-black/60 text-[8px] text-white px-1 rounded uppercase">30km Zone</span></div>
                    </div>

                    <div class="p-6">
                        <textarea id="ocInput" class="w-full h-32 p-4 bg-red-50 text-red-900 border-none font-bold text-sm outline-none resize-none leading-relaxed" readonly>CENTRALIST OC: "Aanrijding voetganger op de Eerste van Swindenstraat / Dapperstraat. Zwarte VW Golf doorgereden richting Linneausstraat. Meerdere getuigen aanwezig. Ambulance is onderweg."</textarea>
                        <button onclick="sendMsg('OC Melding', 'ocInput')" class="w-full mt-2 bg-red-600 text-white py-3 rounded-xl font-black text-[10px] uppercase shadow-md active:scale-95 transition-all">Publiceer op Tijdlijn</button>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-xl border border-emerald-200 overflow-hidden">
                    <div class="bg-emerald-600 px-6 py-4 flex justify-between items-center text-white">
                        <span class="font-black text-xs uppercase tracking-widest italic">Getuigenverhoor</span>
                        <div class="flex gap-2">
                            <button onclick="mediaControl('play', 'getuigeInput')" class="bg-white/20 hover:bg-white/40 px-3 py-1 rounded text-[10px] font-bold uppercase">Start Verhoor</button>
                        </div>
                    </div>
                    <div class="p-6">
                        <textarea id="getuigeInput" class="w-full h-48 p-4 bg-emerald-50/50 border-2 border-emerald-100 rounded-xl text-sm font-medium focus:bg-white outline-none transition-all leading-relaxed" placeholder="Druk op Start Verhoor...">Ik liep zojuist over de Dapperstraat en wilde de Eerste van Swindenstraat via de voetgangersoversteekplaats oversteken. Ongeveer vijf meter voor mij liep een man. Ik zag dat hij inmiddels de voetgangersoversteekplaats was opgelopen. Tegelijkertijd zag ik een zwarte Volkswagen Golf met hoge snelheid aan komen rijden. Deze Volkswagen Golf reed over de Eerste van Swindenstraat komende uit de richting van de Pontanusstraat en rijdende in de richting van de Linneausstraat. Ik zag dat de bestuurder van deze auto geen vaart minderde bij het naderen van de voetgangersoversteekplaats. Ik zag dat deze auto met hoge snelheid de man aanreed die zich op dat moment op de voetgangersoversteekplaats bevond. Ik zag dat de man door deze aanrijding tegen het wegdek werd geworpen en daar gewond bleef liggen. Ik heb vervolgens de politie gebeld.</textarea>
                        <button onclick="sendMsg('Getuigeverklaring', 'getuigeInput')" class="w-full mt-4 bg-emerald-600 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg">Verklaring Vastleggen</button>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-xl border border-blue-200 overflow-hidden">
                    <div class="px-6 py-3 border-b bg-slate-50 flex justify-between items-center text-slate-400">
                        <span class="font-black text-[10px] uppercase italic">Opmaak PV</span>
                    </div>
                    <div class="p-6">
                        <textarea id="pvInput" class="w-full h-40 p-4 bg-blue-50/30 border border-blue-100 rounded-xl font-mono text-xs outline-none" placeholder="Ik, verbalisant...">Ik, [Naam], verbalisant van politie eenheid [Eenheid], zag op 16 maart 2026 omstreeks [Tijd] het volgende...</textarea>
                        <button onclick="sendMsg('PV Bevindingen', 'pvInput')" class="w-full mt-3 bg-[#002d5e] text-white py-3 rounded-xl font-black text-[10px] uppercase shadow-md">Publiceer PV ter Beoordeling</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div class="sticky top-8">
                    <h2 class="text-center font-black text-[11px] text-slate-400 uppercase tracking-[0.4em] mb-4">Operationele Dossier Feed</h2>
                    <div id="liveFeed" class="space-y-8 max-h-[85vh] overflow-y-auto pr-4 custom-scrollbar">
                        </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRq1HFmhrpW_EMMZwpURrbTArz-L5iWT4",
            authDomain: "pvaangifteinleveren-77dbe.firebaseapp.com",
            databaseURL: "https://pvaangifteinleveren-77dbe-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "pvaangifteinleveren-77dbe",
            storageBucket: "pvaangifteinleveren-77dbe.appspot.com",
            messagingSenderId: "20239054410",
            appId: "1:20239054410:web:264b3c759312248d9f18b3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let sNaam = "", sKlas = "", tw, fullT = "", idx = 0;

        window.startDashboard = () => {
            sNaam = document.getElementById('uNaam').value.trim();
            sKlas = document.getElementById('uKlas').value;
            if(!sNaam || !sKlas) return alert("Naam en Eenheid invullen.");
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('displayKlas').innerText = sKlas;
            initFeed(sKlas);
        };

        window.mediaControl = (action, id) => {
            const el = document.getElementById(id);
            if(action === 'play') {
                if(!fullT || el.value !== fullT) { fullT = el.value; idx = 0; el.value = ""; }
                clearInterval(tw);
                tw = setInterval(() => {
                    if(idx < fullT.length) { el.value += fullT[idx++]; el.scrollTop = el.scrollHeight; }
                    else clearInterval(tw);
                }, 30);
            }
        };

        window.resetMedia = (id) => { clearInterval(tw); document.getElementById(id).value = fullT; fullT = ""; idx = 0; };

        window.sendMsg = (type, inputId) => {
            const val = document.getElementById(inputId).value.trim();
            if(!val) return;
            db.ref('btv_2026/' + sKlas).push().set({ naam: sNaam, type: type, txt: val, ts: Date.now() });
        };

        window.addFeedback = (targetId) => {
            const comment = prompt("Jouw feedback op dit bericht:");
            if(!comment) return;
            db.ref('btv_2026/' + sKlas).push().set({
                naam: sNaam, type: 'Feedback', txt: comment, ts: Date.now(), replyTo: targetId
            });
        };

        function initFeed(k) {
            db.ref('btv_2026/' + k).on('value', snap => {
                const feed = document.getElementById('liveFeed'); feed.innerHTML = "";
                const data = snap.val(); if(!data) return;

                const all = Object.keys(data).map(id => ({id, ...data[id]}));
                const mains = all.filter(m => m.type !== 'Feedback').sort((a,b) => b.ts - a.ts);

                mains.forEach(m => {
                    const style = m.type === 'OC Melding' ? 'border-l-red-600 bg-red-50' : (m.type === 'Getuigeverklaring' ? 'border-l-emerald-600 bg-emerald-50' : 'border-l-blue-900 bg-white');
                    
                    let container = document.createElement('div');
                    container.className = "animate-in slide-in-from-bottom-4 duration-300";
                    container.innerHTML = `
                        <div class="bg-white border-l-8 ${style} rounded-2xl shadow-md border border-slate-200 overflow-hidden mb-2">
                            <div class="px-5 py-2 border-b flex justify-between items-center text-[10px] font-black uppercase text-slate-400">
                                <span>${m.naam} • ${m.type}</span>
                                <button onclick="addFeedback('${m.id}')" class="text-blue-600 hover:underline">Geef Feedback</button>
                            </div>
                            <div class="p-6 text-sm font-medium leading-relaxed whitespace-pre-wrap">${m.txt}</div>
                        </div>`;

                    const replies = all.filter(r => r.type === 'Feedback' && r.replyTo === m.id).sort((a,b) => a.ts - b.ts);
                    replies.forEach(r => {
                        container.innerHTML += `
                            <div class="ml-10 mt-2 p-3 bg-slate-200/50 rounded-xl border-l-4 border-slate-400 text-xs italic shadow-sm">
                                <span class="font-black uppercase text-[9px] text-slate-500 block">${r.naam} (FEEDBACK):</span>
                                "${r.txt}"
                            </div>`;
                    });
                    feed.appendChild(container);
                });
            });
        }
    </script>
</body>
</html>
