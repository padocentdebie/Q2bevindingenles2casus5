<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTV Dashboard | Realtime Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // JOUW FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBRq1HFmhrpW_EMMZwpURrbTArz-L5iWT4",
            authDomain: "pvaangifteinleveren-77dbe.firebaseapp.com",
            databaseURL: "https://pvaangifteinleveren-77dbe-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "pvaangifteinleveren-77dbe",
            storageBucket: "pvaangifteinleveren-77dbe.appspot.com",
            messagingSenderId: "20239054410",
            appId: "1:20239054410:web:264b3c759312248d9f18b3"
        };

        // Initialiseer Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let studentNaam = "";
        let studentKlas = "";

        // LOGIN FUNCTIE
        window.startLes = () => {
            studentNaam = document.getElementById('uNaam').value.trim();
            studentKlas = document.getElementById('uKlas').value;
            
            if(!studentNaam || !studentKlas) {
                alert("Naam en Eenheid invullen a.u.b.");
                return;
            }
            
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('displayKlas').innerText = studentKlas;
            
            listenToRealtimeFeed(studentKlas);
        };

        // DATA VERZENDEN NAAR REALTIME DB
        window.sendData = (type, elementId) => {
            const txt = document.getElementById(elementId).value.trim();
            if(!txt) return;

            const postRef = database.ref('btv_2026/' + studentKlas).push();
            postRef.set({
                naam: studentNaam,
                type: type,
                txt: txt,
                ts: Date.now()
            }).then(() => {
                if(type !== 'PV Bevindingen') {
                    document.getElementById(elementId).value = "";
                }
            }).catch(e => alert("Verzendfout: " + e.message));
        };

        // DE LIVEFEED (LUISTERT NAAR SPECIFIEKE KLAS-MAP)
        function listenToRealtimeFeed(klas) {
            const feedRef = database.ref('btv_2026/' + klas);

            feedRef.on('value', (snapshot) => {
                const feed = document.getElementById('liveFeed');
                feed.innerHTML = "";
                
                const data = snapshot.val();
                if (!data) {
                    feed.innerHTML = "<p class='text-center text-slate-400 text-[10px] uppercase tracking-widest mt-10'>Wachten op eerste bericht...</p>";
                    return;
                }

                // Omzetten naar array en sorteren op tijd (nieuwste boven)
                const messages = Object.keys(data).map(key => data[key]);
                messages.sort((a, b) => b.ts - a.ts);

                messages.forEach(msg => {
                    const config = {
                        'DAA': 'border-l-yellow-500 bg-yellow-50 text-yellow-900',
                        'PV Bevindingen': 'border-l-blue-900 bg-blue-50 text-blue-900',
                        'Feedback': 'border-l-slate-400 bg-slate-50 text-slate-700'
                    }[msg.type] || 'border-l-gray-300 bg-gray-50';

                    const tijd = new Date(msg.ts).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    feed.innerHTML += `
                        <div class="mb-4 bg-white border border-slate-200 border-l-4 ${config.split(' ')[0]} rounded-lg shadow-sm overflow-hidden">
                            <div class="px-4 py-2 border-b flex justify-between items-center bg-white/50">
                                <span class="font-black text-[10px] uppercase tracking-tighter text-slate-600">${msg.naam} • ${tijd}</span>
                                <span class="text-[9px] font-bold px-2 py-0.5 rounded ${config.split(' ')[1]} ${config.split(' ')[2]} uppercase">${msg.type}</span>
                            </div>
                            <div class="p-4 text-sm leading-relaxed whitespace-pre-wrap font-medium">${msg.txt}</div>
                            <div class="px-4 py-1 bg-slate-50 border-t text-right">
                                <button onclick="replyTo('${msg.naam}')" class="text-[9px] font-black text-blue-600 uppercase">Beantwoorden</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        window.replyTo = (naam) => {
            const input = document.getElementById('feedbackInput');
            input.value = `@${naam}: `;
            input.focus();
        };

        window.generatePDF = () => window.print();
    </script>

    <style>
        .bg-police { background-color: #002d5e; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div id="loginOverlay" class="fixed inset-0 bg-police z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm border-t-8 border-yellow-500 text-center">
            <h1 class="font-black text-2xl text-[#002d5e] uppercase italic mb-6">BTV Live (RTDB)</h1>
            <input type="text" id="uNaam" placeholder="Voornaam" class="w-full border-2 p-3 rounded-lg mb-4 font-bold outline-none text-center">
            <select id="uKlas" class="w-full border-2 p-3 rounded-lg mb-8 font-bold outline-none text-center">
                <option value="">-- Eenheid --</option>
                <option>Delta</option><option>Echo</option><option>Foxtrot</option><option>Lima</option><option>Mike</option>
            </select>
            <button onclick="startLes()" class="w-full bg-police text-white py-4 rounded-xl font-black uppercase tracking-widest transition-all active:scale-95">Start Live Feed</button>
        </div>
    </div>

    <div id="mainContent" class="hidden max-w-6xl mx-auto p-4 md:p-8 space-y-8">
        <header class="flex justify-between items-center border-b-4 border-[#002d5e] pb-4 no-print">
            <h1 class="font-black italic text-2xl text-[#002d5e] uppercase">Eenheid <span id="displayKlas" class="text-yellow-600"></span></h1>
            <button onclick="generatePDF()" class="bg-slate-800 text-white px-4 py-2 rounded font-bold text-xs uppercase">Dossier Printen</button>
        </header>

        <div class="grid lg:grid-cols-2 gap-8">
            <div class="space-y-6 no-print">
                <div class="bg-white p-6 rounded-xl shadow-md border border-slate-200">
                    <h2 class="font-black text-xs uppercase mb-4 text-slate-400 italic">1. Plan van Aanpak (DAA)</h2>
                    <textarea id="daaInput" class="w-full h-24 p-4 bg-yellow-50 border rounded-lg text-sm outline-none" placeholder="Doel, Aanpak, Analyse..."></textarea>
                    <button onclick="sendData('DAA', 'daaInput')" class="w-full mt-3 bg-yellow-600 text-white py-2 rounded-lg font-black text-[10px] uppercase">Plan Publiceren</button>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-md border border-slate-200">
                    <h2 class="font-black text-xs uppercase mb-4 text-slate-400 italic">2. Proces-Verbaal</h2>
                    <textarea id="pvInput" class="w-full h-80 p-4 bg-slate-50 border font-mono text-sm rounded-lg outline-none" placeholder="Ik, verbalisant...">PV VAN BEVINDINGEN...</textarea>
                    <button onclick="sendData('PV Bevindingen', 'pvInput')" class="w-full mt-3 bg-[#002d5e] text-white py-3 rounded-lg font-black text-xs uppercase tracking-widest">PV Versturen naar Tijdlijn</button>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-md border border-slate-200">
                    <h2 class="font-black text-xs uppercase mb-4 text-slate-400 italic">3. Reactie / Feedback</h2>
                    <textarea id="feedbackInput" class="w-full h-20 p-4 border rounded-lg text-sm outline-none" placeholder="Geef feedback..."></textarea>
                    <button onclick="sendData('Feedback', 'feedbackInput')" class="w-full mt-3 bg-slate-600 text-white py-2 rounded-lg font-black text-[10px] uppercase">Bericht Plaatsen</button>
                </div>
            </div>

            <div class="space-y-4">
                <h2 class="text-center font-black text-[10px] text-slate-400 uppercase tracking-[0.3em] mb-6">Live Tijdlijn Eenheid</h2>
                <div id="liveFeed" class="space-y-4 max-h-[1200px] overflow-y-auto pr-2"></div>
            </div>
        </div>
    </div>

</body>
</html>
