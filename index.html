<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTV Live Feedback Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        .bg-police { background-color: #002d5e; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .feedback-item { position: relative; margin-left: 2.5rem; }
        .feedback-item::before { content: ''; position: absolute; left: -1.25rem; top: -1rem; bottom: 1.5rem; width: 2px; background: #cbd5e1; }
        @keyframes slide { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .animate-fb { animation: slide 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <div id="loginOverlay" class="fixed inset-0 bg-[#002d5e] z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border-t-8 border-yellow-500 text-center">
            <h1 class="font-black text-3xl text-[#002d5e] uppercase italic mb-8">BTV LIVE</h1>
            <input type="text" id="uNaam" placeholder="Naam" class="w-full border-2 p-4 rounded-xl mb-4 text-center font-bold outline-none">
            <select id="uKlas" class="w-full border-2 p-4 rounded-xl mb-8 text-center font-bold outline-none">
                <option value="">-- Eenheid --</option>
                <option>Delta</option><option>Echo</option><option>Foxtrot</option>
            </select>
            <button onclick="startDashboard()" class="w-full bg-[#002d5e] text-white py-4 rounded-xl font-black uppercase tracking-widest active:scale-95 transition-all">Systeem Activeren</button>
        </div>
    </div>

    <div id="mainContent" class="hidden max-w-[1600px] mx-auto p-4 lg:p-8 space-y-6">
        
        <div class="grid lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-5 space-y-6">
                <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                    <div class="bg-[#002d5e] px-6 py-4 flex justify-between items-center text-white text-xs font-black uppercase tracking-widest italic">
                        PV van Bevindingen Opstellen
                    </div>
                    <div class="p-6">
                        <textarea id="pvInput" class="w-full h-80 p-6 bg-slate-50 border-2 border-slate-100 rounded-xl font-mono text-sm leading-relaxed focus:bg-white outline-none" placeholder="Begin hier met je PV..."></textarea>
                        <button onclick="publishPV()" class="w-full mt-4 bg-[#002d5e] text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-all">Verstuur ter Beoordeling</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7">
                <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-4 text-center italic">Live Dossier & Beoordelingen</h2>
                <div id="liveFeed" class="space-y-8 max-h-[85vh] overflow-y-auto pr-4 custom-scrollbar">
                    </div>
            </div>

        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRq1HFmhrpW_EMMZwpURrbTArz-L5iWT4",
            authDomain: "pvaangifteinleveren-77dbe.firebaseapp.com",
            databaseURL: "https://pvaangifteinleveren-77dbe-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "pvaangifteinleveren-77dbe",
            storageBucket: "pvaangifteinleveren-77dbe.appspot.com",
            messagingSenderId: "20239054410",
            appId: "1:20239054410:web:264b3c759312248d9f18b3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let sNaam = "", sKlas = "";

        window.startDashboard = () => {
            sNaam = document.getElementById('uNaam').value.trim();
            sKlas = document.getElementById('uKlas').value;
            if(!sNaam || !sKlas) return alert("Vul gegevens in.");
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').classList.remove('hidden');
            initFeed(sKlas);
        };

        window.publishPV = () => {
            const val = document.getElementById('pvInput').value.trim();
            if(!val) return;
            db.ref('btv_2026/' + sKlas).push().set({
                naam: sNaam, type: 'PV Bevindingen', txt: val, ts: Date.now()
            });
            document.getElementById('pvInput').value = "";
        };

        window.sendFeedback = (targetId) => {
            const inputEl = document.getElementById('fbInput-' + targetId);
            const fbText = inputEl.value.trim();
            if(!fbText) return;
            
            db.ref('btv_2026/' + sKlas).push().set({
                naam: sNaam, type: 'Feedback', txt: fbText, ts: Date.now(), replyTo: targetId
            });
            inputEl.value = "";
        };

        function initFeed(k) {
            db.ref('btv_2026/' + k).on('value', snap => {
                const feed = document.getElementById('liveFeed'); feed.innerHTML = "";
                const data = snap.val(); if(!data) return;

                const all = Object.keys(data).map(id => ({id, ...data[id]}));
                const mains = all.filter(m => m.type !== 'Feedback').sort((a,b) => b.ts - a.ts);

                mains.forEach(m => {
                    let card = document.createElement('div');
                    card.className = "space-y-3";
                    card.innerHTML = `
                        <div class="bg-white border-l-8 border-[#002d5e] rounded-2xl shadow-md border border-slate-200 overflow-hidden">
                            <div class="px-5 py-2 border-b bg-slate-50 flex justify-between items-center text-[10px] font-black uppercase text-slate-400">
                                <span>${m.naam} • ${new Date(m.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                <span class="italic text-[#002d5e]">${m.type}</span>
                            </div>
                            <div class="p-6 text-sm font-medium leading-relaxed whitespace-pre-wrap text-slate-800">${m.txt}</div>
                            
                            <div class="px-5 py-3 bg-slate-50 border-t flex gap-2 items-center">
                                <input id="fbInput-${m.id}" type="text" placeholder="Schrijf een beoordeling..." 
                                    class="flex-1 bg-white border-2 border-slate-200 rounded-lg px-4 py-2 text-xs font-bold outline-none focus:border-[#002d5e] transition-all">
                                <button onclick="sendFeedback('${m.id}')" 
                                    class="bg-yellow-500 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase shadow-sm hover:bg-yellow-600 transition-all">Verstuur</button>
                            </div>
                        </div>`;

                    // FEEDBACK LIJST (Genest onder het bericht)
                    const replies = all.filter(r => r.replyTo === m.id).sort((a,b) => a.ts - b.ts);
                    replies.forEach(r => {
                        card.innerHTML += `
                            <div class="feedback-item animate-fb p-4 bg-slate-200/50 rounded-xl border-l-4 border-slate-400 text-xs italic shadow-sm mb-2">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="font-black uppercase text-[9px] text-slate-500">${r.naam} beoordeelt:</span>
                                    <span class="text-[8px] text-slate-400">${new Date(r.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                </div>
                                <div class="text-slate-700 font-medium">"${r.txt}"</div>
                            </div>`;
                    });
                    feed.appendChild(card);
                });
            });
        }
    </script>
</body>
</html>
